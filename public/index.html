<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Brief</title>

  <style>
    :root {
      --bg: #0b1e3a;
      --card: #ffffff;
      --text: #e5e7eb;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --tag-bg: #eef2ff;
      --tag-text: #4338ca;
      --link: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .header {
      margin-bottom: 28px;
    }

    .feed-manager {
      margin-bottom: 28px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      padding: 20px;
      backdrop-filter: blur(6px);
    }

    .feed-manager-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: transparent;
      border: none;
      padding: 0;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .feed-manager-toggle-text {
      display: block;
    }

    .feed-manager-toggle-text h2 {
      margin: 0 0 6px;
      font-size: 1.1rem;
      color: var(--text);
    }

    .feed-manager-toggle-text p {
      margin: 0;
      color: var(--text);
      opacity: 0.88;
    }

    .feed-manager-chevron {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    .feed-manager.is-collapsed .feed-manager-chevron {
      transform: rotate(-90deg);
    }

    .feed-manager-body {
      margin-top: 16px;
    }

    .feed-manager.is-collapsed .feed-manager-body {
      display: none;
    }

    .feed-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .feed-form input {
      flex: 1 1 320px;
      min-width: 0;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.96);
      color: #111827;
      font-size: 0.95rem;
    }

    .feed-form button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      background: #ffffff;
      color: #0b1e3a;
      font-weight: 700;
      cursor: pointer;
    }

    .feed-form button:hover {
      opacity: 0.92;
    }

    .feed-message {
      min-height: 20px;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 0.9rem;
    }

    .feed-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .feed-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      color: #111827;
    }

    .feed-item a {
      color: #111827;
      font-weight: 600;
      word-break: break-all;
    }

    .remove-feed {
      border: none;
      background: transparent;
      color: #b91c1c;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #374151;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--text);
      font-size: 1.05rem;
    }

    #date {
      margin-top: 14px;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
    }

    #stories {
      display: grid;
      gap: 18px;
    }

    .story {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: var(--shadow);
      color: #1f2937;
    }

    .story-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .category {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .story h2 {
      margin: 0 0 14px;
      font-size: 1.35rem;
      line-height: 1.25;
      letter-spacing: -0.02em;
      color: #111827;
    }

    .story p {
      margin: 0 0 10px;
      color: #111827;
    }

    .story p:last-of-type {
      margin-bottom: 0;
    }

    .source-summary {
      margin-top: 12px;
      color: #374151;
      font-size: 0.95rem;
    }

    .label {
      font-weight: 700;
      color: #111827;
    }

    .story-footer {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    .empty-state {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    @media (max-width: 640px) {
      .page {
        padding: 32px 16px 48px;
      }

      .story {
        padding: 20px;
      }

      h1 {
        font-size: 2.25rem;
      }

      .feed-item {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div class="eyebrow">Personal Briefing</div>
      <h1>Daily Brief</h1>
      <p class="subtitle">What matters today. Nothing more.</p>
      <div id="date"></div>
    </header>

    <section class="feed-manager is-collapsed" id="feed-manager">
      <button class="feed-manager-toggle" id="feed-toggle" type="button" aria-expanded="false" aria-controls="feed-manager-body">
        <span class="feed-manager-toggle-text">
          <h2>RSS Feeds</h2>
          <p>Add feed URLs here so you can keep track of sources you want in the mix.</p>
        </span>
        <span class="feed-manager-chevron">▾</span>
      </button>

      <div class="feed-manager-body" id="feed-manager-body">
        <form id="feed-form" class="feed-form">
          <input
            id="feed-url"
            type="url"
            placeholder="https://example.com/feed.xml"
            autocomplete="off"
            required
          />
          <button type="submit">Add Feed</button>
        </form>

        <div id="feed-message" class="feed-message"></div>
        <ul id="feed-list" class="feed-list"></ul>
      </div>
    </section>

    <section id="stories"></section>
  </main>

  <script>
    const FEED_STORAGE_KEY = 'dailyBriefFeeds';

    function getSavedFeeds() {
      try {
        const saved = JSON.parse(localStorage.getItem(FEED_STORAGE_KEY) || '[]');
        return Array.isArray(saved) ? saved : [];
      } catch {
        return [];
      }
    }

    function saveFeeds(feeds) {
      localStorage.setItem(FEED_STORAGE_KEY, JSON.stringify(feeds));
    }

    function wireFeedToggle() {
      const toggle = document.getElementById('feed-toggle');
      const manager = document.getElementById('feed-manager');

      if (!toggle || !manager) return;

      toggle.addEventListener('click', () => {
        const isCollapsed = manager.classList.toggle('is-collapsed');
        toggle.setAttribute('aria-expanded', String(!isCollapsed));
      });
    }

    function renderFeedList() {
      const feedList = document.getElementById('feed-list');
      if (!feedList) return;

      const feeds = getSavedFeeds();
      feedList.innerHTML = '';

      if (!feeds.length) {
        const emptyItem = document.createElement('li');
        emptyItem.className = 'feed-item';
        emptyItem.textContent = 'No saved feeds yet.';
        feedList.appendChild(emptyItem);
        return;
      }

      feeds.forEach((feedUrl, index) => {
        const item = document.createElement('li');
        item.className = 'feed-item';

        item.innerHTML = `
          <a href="${feedUrl}" target="_blank" rel="noopener noreferrer">${feedUrl}</a>
          <button class="remove-feed" data-index="${index}" type="button">Remove</button>
        `;

        feedList.appendChild(item);
      });
    }

    function wireFeedForm() {
      const form = document.getElementById('feed-form');
      const input = document.getElementById('feed-url');
      const message = document.getElementById('feed-message');
      const feedList = document.getElementById('feed-list');

      if (!form || !input || !message || !feedList) return;

      form.addEventListener('submit', event => {
        event.preventDefault();

        const url = input.value.trim();
        if (!url) return;

        const feeds = getSavedFeeds();
        if (feeds.includes(url)) {
          message.textContent = 'That feed is already saved.';
          return;
        }

        feeds.push(url);
        saveFeeds(feeds);
        renderFeedList();
        message.textContent = 'Feed saved in this browser.';
        input.value = '';
      });

      feedList.addEventListener('click', event => {
        const button = event.target.closest('.remove-feed');
        if (!button) return;

        const index = Number(button.dataset.index);
        const feeds = getSavedFeeds();
        feeds.splice(index, 1);
        saveFeeds(feeds);
        renderFeedList();
        message.textContent = 'Feed removed.';
      });
    }

    fetch('daily.json')
      .then(response => response.json())
      .then(data => {
        document.getElementById('date').innerText = data.date;

        const container = document.getElementById('stories');
        container.innerHTML = '';

        data.stories.forEach(story => {
          const card = document.createElement('article');
          card.className = 'story';

          const consolidatedSources = Array.isArray(story.sources)
            ? story.sources.filter(source => source && source.name)
            : [];
          const sourceSummary = consolidatedSources.length
            ? `<p class="source-summary"><span class="label">Sources:</span> ${consolidatedSources.map(source => source.name).join(', ')}</p>`
            : '';
          const primarySource = consolidatedSources.find(source => source.url) || (story.source ? { url: story.source } : null);

          card.innerHTML = `
            <div class="story-top">
              ${story.category ? `<span class="category">${story.category}</span>` : ''}
            </div>
            <h2>${story.title}</h2>
            <p><span class="label">What happened:</span> ${story.what}</p>
            <p><span class="label">Why it matters:</span> ${story.why}</p>
            <p><span class="label">Watch:</span> ${story.watch}</p>
            ${sourceSummary}
            ${primarySource ? `<div class="story-footer"><a href="${primarySource.url}" target="_blank" rel="noopener noreferrer">Read primary source</a></div>` : ''}
          `;

          container.appendChild(card);
        });
      })
      .catch(err => {
        document.getElementById('stories').innerHTML = '<div class="empty-state">Could not load today\'s briefing.</div>';
        console.error(err);
      })
      .finally(() => {
        wireFeedToggle();
        renderFeedList();
        wireFeedForm();
      });
  </script>
</body>
</html>
